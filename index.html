<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Convite Especial ❤️</title>
  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: linear-gradient(to bottom, #ff758c, #ff7eb3);
      text-align: center;
      color: #fff;
      overflow-x: hidden;
    }
    header {
      padding: 40px;
      font-size: 2.3em;
      font-weight: bold;
      animation: fadeIn 2s ease-in-out;
    }
    .mensagem {
      max-width: 700px;
      margin: 20px auto;
      font-size: 1.2em;
      padding: 20px;
      animation: fadeIn 3s ease-in-out;
    }
    .opcoes button {
      margin: 10px;
      padding: 15px 25px;
      font-size: 1em;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #fff;
      color: #ff4d6d;
      transition: 0.3s;
    }
    .opcoes button:hover {
      transform: scale(1.1);
    }
    .galeria {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      padding: 20px;
    }
    .galeria img {
      width: 250px;
      height: 300px;
      object-fit: cover;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.4);
      transition: 0.4s;
    }
    .galeria img:hover {
      transform: scale(1.05);
    }
    .surpresa {
      display: none;
      margin-top: 20px;
      font-size: 1.2em;
      animation: fadeIn 2s ease-in-out;
    }
    .coracoes {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    .coracao {
      position: absolute;
      color: #fff;
      animation: cair 5s linear infinite;
    }
    @keyframes cair {
      0% {transform: translateY(-10px); opacity: 1;}
      100% {transform: translateY(100vh); opacity: 0;}
    }
    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);} 
      to {opacity: 1; transform: translateY(0);} 
    }
  </style>
</head>
<body>

<div class="coracoes" id="coracoes"></div>

<header>
  ❤️ Convite Só Nosso ❤️
</header>

<div class="mensagem">
  <p>Amor... preparei algo especial pra gente 😏</p>
  <p>Que tal escolher como vamos aproveitar nosso momento juntos?</p>
</div>

<div class="opcoes">
  <button onclick="resposta('jantar')">🍽️ Sair para jantar</button>
  <button onclick="resposta('casa')">🏠 Comer em casa</button>
</div>

<div class="galeria">
  <img src="foto1.jpg">
  <img src="foto2.jpg">
  <img src="foto3.jpg">
</div>

<div>
  <button onclick="mostrarSurpresa()">Clique aqui 💖</button>
</div>

<div class="surpresa" id="surpresa">
  <p>
    Eu só quero você comigo, sem pressa... aproveitando cada detalhe,
    cada sorriso, cada toque. ❤️
  </p>
  <p>
    E quem sabe a gente deixa a noite ainda mais especial... 😏
  </p>
</div>

<!-- Música -->
<audio id="musica" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
function resposta(tipo) {
  if(tipo === 'jantar') {
    alert('Perfeito 😍 Já imagino a gente juntinho curtindo esse momento');
  } else {
    alert('Melhor ainda 😏 Só nós dois, do jeitinho que a gente gosta');
  }
  document.getElementById('musica').play();
}

function mostrarSurpresa() {
  document.getElementById("surpresa").style.display = "block";
}

// corações caindo
function criarCoracao() {
  const coracao = document.createElement('div');
  coracao.classList.add('coracao');
  coracao.innerHTML = '❤️';
  coracao.style.left = Math.random() * 100 + 'vw';
  coracao.style.fontSize = Math.random() * 20 + 10 + 'px';
  coracao.style.animationDuration = Math.random() * 3 + 2 + 's';
  document.getElementById('coracoes').appendChild(coracao);

  setTimeout(() => {
    coracao.remove();
  }, 5000);
}

setInterval(criarCoracao, 300);
</script>

</body>
</html>
